<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>新分頁</title>

<style>

:root{
    --bg:#080808;
    --glass:rgba(255,255,255,.08);
    --border:rgba(255,255,255,.12);
    --text:#f5f5f5;
}

*{
    box-sizing:border-box;
}

body{
    margin:0;
    min-height:100vh;
    background:
    linear-gradient(
        135deg,
        #080808,
        #121212,
        #090909
    );
    color:var(--text);
    font-family:
    "Segoe UI",
    "Microsoft JhengHei",
    sans-serif;
}

.lock-screen{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

.card{

    width:100%;
    max-width:420px;

    background:var(--glass);

    backdrop-filter:blur(18px);
    -webkit-backdrop-filter:blur(18px);

    border:1px solid var(--border);

    border-radius:24px;

    padding:30px;
}

.card h2{
    margin-top:0;
}

input{

    width:100%;

    padding:14px;

    margin-top:10px;

    border:none;

    border-radius:12px;

    background:#1a1a1a;

    color:white;

    outline:none;

}

button{

    width:100%;

    margin-top:15px;

    padding:14px;

    border:none;

    border-radius:12px;

    cursor:pointer;

}

#msg{

    margin-top:10px;

    color:#ff9d9d;

}

#story{

    display:none;

    max-width:900px;

    margin:auto;

    padding:30px 20px;

}

.section{

    margin-bottom:18px;

    padding:24px;

    background:rgba(255,255,255,.08);

    border:1px solid rgba(255,255,255,.12);

    border-radius:18px;

    backdrop-filter:blur(20px);
    -webkit-backdrop-filter:blur(20px);

    cursor:pointer;

    transition:
    filter .25s ease,
    opacity .25s ease,
    transform .25s ease;

    white-space:pre-wrap;

    line-height:1.9;

    overflow-wrap:break-word;

}

</style>
</head>
<body>

<div id="lock" class="lock-screen">

            placeholder="Password">

        <button onclick="unlock()">
            解鎖

        <div id="msg"></div>

    </div>

</div>

let timer;

async function sha256(text){

    const buf =
    await crypto.subtle.digest(
        "SHA-256",
        new TextEncoder().encode(text)
    );

    return Array.from(
        new Uint8Array(buf)
    )
    .map(x=>
        x.toString(16).padStart(2,"0")
    )
    .join("");

}

async function deriveKey(password,salt){

    const keyMaterial =
    await crypto.subtle.importKey(
        "raw",
        new TextEncoder().encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
    );

    return crypto.subtle.deriveKey(
    {
        name:"PBKDF2",
        salt:new Uint8Array(salt),
        iterations:150000,
        hash:"SHA-256"
    },
    keyMaterial,
    {
        name:"AES-GCM",
        length:256
    },
    false,
    ["decrypt"]
    );

}

function resetTimer(){

    clearTimeout(timer);

    timer =
    setTimeout(
        lockNow,
        90000
    );

}

function lockNow(){

    document
    .getElementById("story")
    .style.display="none";

    document
    .getElementById("lock")
    .style.display="flex";

    document
    .getElementById("pwd")
    .value="";

    document
    .getElementById("msg")
    .textContent="";

    clearTimeout(timer);

}

async function unlock(){

    const pwd =
        document.getElementById("pwd").value;

    const hash =
        await sha256(pwd);

    const HASH_ORDER = [
        "7442e4b917c55bf44a6979f7090643de911bdd9507707b1562db58a2226a84b2",
        "53f52a34948186caa1daa7eff7fe2bb73b1a29c6f1ecba114ff90a21c8718b65",
        "a17aa1c615003343ebaa9db5c73a728b070e3802b58575f1e2170ef0286b75de"
    ];

    let current =
        Number(
            localStorage.getItem("cycle") || 0
        );

    if(hash !== HASH_ORDER[current]){

        document.getElementById("msg").textContent =
            "目前不是這組密碼";

        return;
    }

    const entry =
        ENCRYPTED_DATA.find(
            x => x.hash === hash
        );

    if(!entry){

        document.getElementById("msg").textContent =
            "找不到加密資料";

        return;
    }

    try{

        const key =
            await deriveKey(
                pwd,
                entry.salt
            );

        const decrypted =
            await crypto.subtle.decrypt(
            {
                name:"AES-GCM",
                iv:new Uint8Array(entry.iv)
            },
            key,
            Uint8Array.from(
                atob(entry.data),
                c=>c.charCodeAt(0)
            )
        );

        const text =
            new TextDecoder()
            .decode(decrypted);

        renderStory(text);

        document.getElementById("lock").style.display =
            "none";

        document.getElementById("story").style.display =
            "block";

        current++;

        if(current >= HASH_ORDER.length){
            current = 0;
        }

        localStorage.setItem(
            "cycle",
            current
        );

        resetTimer();

    }
    catch(e){

        console.error(e);

        document.getElementById("msg").textContent =
            "解密失敗";

    }

}

function renderStory(text){

    const container =
    document.getElementById("story");

    container.innerHTML="";

    const parts =
    text
    .split(/\n\s*\n/)
    .filter(x=>x.trim());

    parts.forEach(p=>{

        const div =
        document.createElement("div");

        div.className="section";

        div.innerText=p;

        div.style.filter="blur(8px)";
        div.style.opacity="0.45";

        div.addEventListener("click",()=>{

            document
            .querySelectorAll(".section")
            .forEach(section=>{

                section.style.filter="blur(8px)";
                section.style.opacity="0.45";
                section.style.transform="scale(1)";

            });

            div.style.filter="none";
            div.style.opacity="1";
            div.style.transform="scale(1.01)";

            resetTimer();

        });

        container.appendChild(div);

    });

}

document.addEventListener(
    "mousemove",
    resetTimer
);

document.addEventListener(
    "keydown",
    resetTimer
);

document.addEventListener(
    "click",
    resetTimer
);

document.addEventListener(
    "visibilitychange",
    ()=>{

        if(document.hidden){

            lockNow();

        }

    }
);

document
.getElementById("pwd")
.addEventListener(
"keydown",
e=>{

    if(e.key==="Enter"){

        unlock();

    }

});

</script>
